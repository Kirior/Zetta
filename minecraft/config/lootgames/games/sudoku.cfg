# Configuration file

##########################################################################################################
# sudoku
#--------------------------------------------------------------------------------------------------------#
# Regulates 'Sudoku' minigame.
##########################################################################################################

sudoku {
    # Number of attempts the player has to submit a correct solution before the game ends. [range: 1 ~ 2147483647, default: 3]
    I:attempt_count=3

    # Controls which player-entered cells are cleared after a wrong submission.
    # ALL - clear every player entry (forces a full redo).
    # NONE - keep every entry, letting the player edit individual cells and resubmit.
    # WRONG_ONLY - clear only cells whose value does not match the solution; correct entries stay. [default: ALL]
    S:clear_on_wrong_answer=ALL

    # How likely this game is chosen compared to other games. The higher this value is, the more likely this game is chosen. Set to 0 to turn this off. [range: 0 ~ 2147483647, default: 1]
    I:weight=1

    ##########################################################################################################
    # hints
    #--------------------------------------------------------------------------------------------------------#
    # Visual hints rendered on the Sudoku board. All default to disabled.
    ##########################################################################################################

    hints {
        # If true, every cell holding a digit is highlighted green once that digit has been placed exactly 9 times across the whole board. [default: false]
        B:hint_completed_digit=false

        # If true, every cell in a row, column or 3x3 box that contains the digits 1-9 exactly once is highlighted cyan. [default: false]
        B:hint_completed_section=false

        # If true, cells containing duplicate digits in the same row, column or 3x3 box are highlighted yellow. [default: false]
        B:hint_duplicates=false

        # If true, cells containing a digit that has been placed more than 9 times across the whole board are highlighted light red. [default: false]
        B:hint_overflow=false
    }

    ##########################################################################################################
    # stage_1
    #--------------------------------------------------------------------------------------------------------#
    # Regulates characteristics of stage 1.
    ##########################################################################################################

    stage_1 {
        # Regulates characteristics of stage 1. [range: 0 ~ 81, default: 25]
        I:blanks=25
    }

    ##########################################################################################################
    # stage_2
    #--------------------------------------------------------------------------------------------------------#
    # Regulates characteristics of stage 2.
    ##########################################################################################################

    stage_2 {
        # Regulates characteristics of stage 2. [range: 0 ~ 81, default: 31]
        I:blanks=31
    }

    ##########################################################################################################
    # stage_3
    #--------------------------------------------------------------------------------------------------------#
    # Regulates characteristics of stage 3.
    ##########################################################################################################

    stage_3 {
        # Regulates characteristics of stage 3. [range: 0 ~ 81, default: 37]
        I:blanks=37
    }

    ##########################################################################################################
    # stage_4
    #--------------------------------------------------------------------------------------------------------#
    # Regulates characteristics of stage 4.
    ##########################################################################################################

    stage_4 {
        # Regulates characteristics of stage 4. [range: 0 ~ 81, default: 43]
        I:blanks=43
    }

}


